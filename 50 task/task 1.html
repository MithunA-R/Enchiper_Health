<script>

// Task1
let height = [0,1,0,2,1,0,1,3,2,1,2,1];
let res = 0;

for(let i = 0; i < height.length; i++){
    let leftMax = 0;
    let rightMax = 0;

    for(let j = 0; j <= i; j++){
        if(height[j] > leftMax){
            leftMax = height[j];
        }
    }

    for(let j = i; j < height.length; j++){
        if(height[j] > rightMax){
            rightMax = height[j];
        }
    }

    let water = Math.min(leftMax, rightMax) - height[i];
    res += water;
}
console.log(res);


// Task2 
let nums = [1,3,-1,-3,5,3,6,7];
let k = 3;
let store = [];

for(let i = 0; i <= nums.length - k; i++){
    let max = nums[i];

    for(let j = i + 1; j < i + k; j++){
        if(nums[j] > max){
            max = nums[j];
        }
    }

    store.push(max);
}
console.log(store);


// Task3 
let s = "abcabcbb";
let max = 0;

for(let i = 0; i < s.length; i++){
    let str = "";

    for(let j = i; j < s.length; j++){
        if(str.includes(s[j])){
            break;
        }
        str += s[j];
    }

    if(str.length > max){
        max = str.length;
    }
}
console.log(max);


// Task4 
let s1 = "ADOBECODEBANC";
let t = "ABC";
let ans = "";

for(let i = 0; i < s1.length; i++){
    for(let j = i + 1; j <= s1.length; j++){
        let sub = s1.substring(i, j);

        if(sub.includes("A") && sub.includes("B") && sub.includes("C")){
            if(ans === "" || sub.length < ans.length){
                ans = sub;
            }
        }
    }
}
console.log(ans);


// Task5 
let arr = [2,1,5,6,2,3];
let higharea = 0;

for(let i = 0; i < arr.length; i++){
    let minHeight = arr[i];

    for(let j = i; j < arr.length; j++){
        if(arr[j] < minHeight){
            minHeight = arr[j];
        }

        let width = j - i + 1;
        let area = minHeight * width;

        if(area > higharea){
            higharea = area;
        }
    }
}
console.log(higharea);

}


// Task7 
let arr2 = [1,2,3,4];
let total = 1;

for(let i = 0; i < arr2.length; i++){
    total *= arr2[i];
}

let result = [];

for(let i = 0; i < arr2.length; i++){
    result.push(total / arr2[i]);
}

console.log(result);
